<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>影子超能力入口網站｜重建中</title>
  <style>
    :root { --ink: #16181d; --muted: #586170; --line: #d8dde5; --paper: #ffffff; --bg: #f5f6f8; --accent: #0f6b5f; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 36px;
      letter-spacing: 0;
    }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .panel {
      margin-top: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }
    h2 { margin: 0 0 12px; font-size: 20px; }
    ul { margin: 0; padding-left: 20px; line-height: 1.8; color: var(--muted); }
    .status {
      display: inline-block;
      margin-top: 18px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #e9f4f1;
      color: var(--accent);
      font-size: 14px;
    }
    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #eef0f2;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>影子超能力入口網站</h1>
    <p>這個版本先關掉重建。前一版分類錯誤，現在暫停公開展示，重新依 Jason 指定的 `partner-superpower-portal` 標準製作。</p>

    <div class="panel">
      <h2>重建原則</h2>
      <ul>
        <li>`partner-superpower-portal` 才是超能力入口網站標準。</li>
        <li>`html-ppt-skill` 只是 HTML PPT 製作技能，不能當成入口網站主體。</li>
        <li>重建前先確認主入口、所有網址、HTML PPT 目錄、技能列表、Google Drive 檔案總管。</li>
        <li>公開頁只放服務能力和成果，不放內部 SOP、帳號、權限或客戶私密資料。</li>
      </ul>
      <span class="status">重建中</span>
    </div>
  </main>
</body>
</html>
