<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>影子超能力入口網</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: #f6f7f8;
      color: #17191c;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0;
    }
    .lead {
      margin: 0 0 28px;
      color: #59616d;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    section {
      background: #fff;
      border: 1px solid #dde1e6;
      border-radius: 8px;
      padding: 18px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.7;
    }
    a {
      color: #0f6b5f;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .status {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #e9f4f1;
      color: #0f5d52;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>影子超能力入口網</h1>
    <p class="lead">集中管理影子的工作流程、素材判斷、音樂授權、PPT 製作和交付檢查。</p>

    <div class="grid">
      <section>
        <h2>HDMI PPT</h2>
        <ul>
          <li>需求確認</li>
          <li>素材整理</li>
          <li>PPT 製作</li>
          <li>輸出交付</li>
        </ul>
        <span class="status">流程已建立</span>
      </section>
      <section>
        <h2>選圖片</h2>
        <ul>
          <li>主體完整</li>
          <li>比例正確</li>
          <li>產品清楚</li>
          <li>手機舒服</li>
        </ul>
        <span class="status">技能已整理</span>
      </section>
      <section>
        <h2>選音樂</h2>
        <ul>
          <li>情緒符合</li>
          <li>節奏穩定</li>
          <li>品牌質感</li>
          <li>授權安全</li>
        </ul>
        <span class="status">技能已整理</span>
      </section>
      <section>
        <h2>串接狀態</h2>
        <ul>
          <li>GitHub CLI：已安裝，待登入</li>
          <li>Google Drive：rclone 已安裝，待授權</li>
          <li>網站 Git：已初始化並提交</li>
        </ul>
        <span class="status">等待授權</span>
      </section>
    </div>
  </main>
</body>
</html>
